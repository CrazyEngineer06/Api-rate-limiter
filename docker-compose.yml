version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: rate-limiter-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - rate-limiter-net

  node-1:
    build: ./backend
    container_name: rate-limiter-node-1
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NODE_ID=node-1
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rate-limiter-net

  node-2:
    build: ./backend
    container_name: rate-limiter-node-2
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - NODE_ID=node-2
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rate-limiter-net

  frontend:
    build: ./frontend
    container_name: rate-limiter-frontend
    ports:
      - "3000:3000"
    depends_on:
      - node-1
      - node-2
    restart: unless-stopped
    networks:
      - rate-limiter-net

networks:
  rate-limiter-net:
    driver: bridge
